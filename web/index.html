<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="تطبيق أذكار للويب">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="أذكار">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>أذكار</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #f8f0dc 0%, #f4ead0 100%);
    }

    body {
      overflow: hidden;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
    }

    #app-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, rgba(196, 159, 58, 0.18), transparent 35%),
        linear-gradient(180deg, #fbf4e5 0%, #f4ead0 100%);
      z-index: 9999;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }

    #app-loader.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      color: #6f5315;
      text-align: center;
    }

    .loader-logo {
      width: 92px;
      height: 92px;
      border-radius: 24px;
      box-shadow: 0 18px 35px rgba(84, 63, 16, 0.14);
    }

    .loader-spinner {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 4px solid rgba(196, 159, 58, 0.22);
      border-top-color: #c49f3a;
      animation: spin 0.9s linear infinite;
    }

    .loader-text {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div id="app-loader" dir="rtl" aria-live="polite">
    <div class="loader-card">
      <img class="loader-logo" src="icons/Icon-192.png" alt="أذكار">
      <div class="loader-spinner" aria-hidden="true"></div>
      <div class="loader-text">جاري تحميل الأذكار...</div>
    </div>
  </div>

  <script>
    const loaderShownAt = Date.now();

    function hideLoader() {
      const loader = document.getElementById('app-loader');
      if (loader) {
        loader.classList.add('is-hidden');
      }
      document.body.style.overflow = 'auto';
    }

    window.addEventListener('flutter-first-frame', function () {
      const minimumLoaderTime = 4500;
      const elapsed = Date.now() - loaderShownAt;
      const remaining = Math.max(0, minimumLoaderTime - elapsed);
      window.setTimeout(hideLoader, remaining);
    });

    window.setTimeout(hideLoader, 15000);
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>

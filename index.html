<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="تطبيق أذكار الصباح والمساء">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="أذكار">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icons/Icon-192.png"/>

  <title>أذكار</title>
  <link rel="manifest" href="manifest.json">

  <!-- Preconnect for speed -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Preload font files directly (highest priority) -->
  <link rel="preload" as="font" type="font/ttf"
        href="assets/fonts/ScheherazadeNew-Regular.ttf" crossorigin>
  <link rel="preload" as="font" type="font/ttf"
        href="assets/fonts/ScheherazadeNew-Bold.ttf" crossorigin>
  <link rel="preload" as="font" type="font/ttf"
        href="assets/fonts/Amiri-Regular.ttf" crossorigin>

  <style>
    @font-face {
      font-family: 'Scheherazade New';
      src: url('assets/fonts/ScheherazadeNew-Regular.ttf') format('truetype');
      font-weight: 400;
      font-display: block;
    }
    @font-face {
      font-family: 'Scheherazade New';
      src: url('assets/fonts/ScheherazadeNew-Bold.ttf') format('truetype');
      font-weight: 700;
      font-display: block;
    }
    @font-face {
      font-family: 'Amiri';
      src: url('assets/fonts/Amiri-Regular.ttf') format('truetype');
      font-weight: 400;
      font-display: block;
    }

    html, body { margin: 0; padding: 0; background: #FDF6E3; }

    #loading-screen {
      position: fixed;
      inset: 0;
      background: #FDF6E3;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-family: 'Scheherazade New', serif;
      flex-direction: column;
      gap: 16px;
    }

    #loading-screen span {
      font-size: 28px;
      color: #5A3A0A;
      font-family: 'Scheherazade New', serif;
    }

    #loading-screen .dot-row {
      display: flex; gap: 8px;
    }

    #loading-screen .dot {
      width: 8px; height: 8px;
      background: #C9A84C;
      border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }
    #loading-screen .dot:nth-child(2) { animation-delay: 0.2s; }
    #loading-screen .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50%       { opacity: 1;   transform: scale(1.2); }
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <span>بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ</span>
    <div class="dot-row">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <script>
    document.fonts.ready.then(function() {
      var loader = document.getElementById('loading-screen');
      if (loader) {
        loader.style.transition = 'opacity 0.3s';
        loader.style.opacity = '0';
        setTimeout(function() { loader.remove(); }, 300);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>

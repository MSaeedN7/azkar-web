name: azkar_native_app
description: تطبيق أذكار Native مبني بـ Flutter.
publish_to: 'none'
version: 1.0.1+3

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.1.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.2
  vibration: ^3.1.3
  flutter_local_notifications: ^18.0.0
  geolocator: ^13.0.0
  timezone: ^0.9.4
  http: ^1.2.0
  flutter_timezone: ^4.1.1
  workmanager: ^0.7.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/SVG/

dev_dependencies:
  flutter_launcher_icons: ^0.14.1
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/adaptive-icon-foreground.png"
  adaptive_icon_background: "assets/icons/adaptive-icon-background.png"
  adaptive_icon_foreground: "assets/icons/adaptive-icon-foreground.png"
  min_sdk_android: 21
